name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Build Plugins
        run: |
          chmod +x gradlew
          ./gradlew make makePluginsJson

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: CloudStream-Plugins
          path: |
            **/build/*.cs3
            build/plugins.json